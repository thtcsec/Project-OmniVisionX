# OmniVision Redis Configuration - Ephemeral Event Bus
# No persistence - streams are transient

# Disable persistence
save ""
appendonly no

# Memory optimization
maxmemory 512mb
maxmemory-policy allkeys-lru

# Network
bind 0.0.0.0
protected-mode no
tcp-keepalive 60
timeout 0

# Performance
hz 100
tcp-backlog 511
